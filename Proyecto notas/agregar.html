<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Nota - Estilo Boceto</title>
    <link rel="stylesheet" href="css/agregar.css">
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
</head>
<body>

    <form class="agregar" id="nuevaNota">
        <h1>Nueva/Editar  Nota</h1>

        <label>Titulo:</label>
        <input type="text" placeholder="Agregar titulo" id="titulo">

        <label>Descripción:</label>
        <textarea placeholder="Agregar descripcion" id="descripcion"></textarea>
        
        <div class="color">
            <label>Color: </label>
            <input type="color" id="color">
        </div>
        <div class="fecha">
            <label>Fecha: </label>
            <input type="date" id="fecha">
        </div>
        
        <div class="botones">
            <button type="reset" class="btn-cancelar" id="btn-cancelar">Cancelar</button>
            <button type="submit" class="btn-guardar" >Guardar</button>
        </div>

    </form>
    <script src="js/agregar.js"></script>
</body>
</html>
