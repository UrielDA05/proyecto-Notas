<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Cuenta</title>
    <link rel="stylesheet" href="css/estilo_1.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
</head>
<body>

    <form class="login-form" id="formulario-recuperar" onsubmit="event.preventDefault();">
        <div>
            <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h1>Recuperar Nota</h1>

        <div id="msg" class="hidden"></div>

        <input type="text" placeholder="Ingresa tu correo" required id="nombre">

        <button type="submit" id="btnAction">Enviar Correo</button>

        <div class="auth-links">
            <a href="index.html" style="color: #fe6929; text-decoration: none; font-weight: bold;">Volver al Login</a>
        </div>
    </form>

    <script src="js/recuperar.js"></script>
</body>
</html>
