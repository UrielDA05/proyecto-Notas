<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Nota - Estilo Boceto</title>
    <link rel="stylesheet" href="css/agregar.css">
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
</head>
<body>

    <form class="agregar" id="nuevaNota" onsubmit="event.preventDefault();">
        <h1 id="formNoteTitle">Nueva/Editar Nota</h1>

        <label>Titulo:</label>
        <input type="text" placeholder="Agregar titulo" id="titulo" required>

        <label>Descripción:</label>
        <textarea placeholder="Agregar descripcion" id="descripcion" required></textarea>
        
        <div class="color">
            <label>Color: </label>
            <input type="color" id="color" value="#2dc7ff">
        </div>
        
        <div class="botones">
            <button type="button" class="btn-cancelar" id="btn-cancelar">Cancelar</button>
            <button type="button" class="btn-guardar" id="btn-guardar">Guardar</button>
        </div>
    </form>

    <script src="js/agregar.js"></script>
</body>
</html>
