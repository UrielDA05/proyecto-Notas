<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/inicio.css">
    <title>Notas</title>
</head>
<body>
    <header>
        <h1>Notas</h1>
        <form onsubmit="event.preventDefault();">
            <input type="text" id="buscadorNotas" placeholder="Buscar">
            <div>
                <i class="bi bi-search"></i>
            </div>
        </form>
        <button id="btn-salir"> 
            <i class="bi bi-box-arrow-right"></i>
        </button>
    </header>

    <main>
        <a href="agregar.html" class="btn-add"> +</a>
        <ul id="listaNotas">
            </ul>
    </main>
    <script src="js/salir.js"></script>
    <script src="js/mostrar.js"></script>
    <script>
    // Esperamos a que la página cargue por completo
    document.addEventListener('DOMContentLoaded', () => {
        const buscador = document.getElementById('buscadorNotas');
        
        // Cada vez que el usuario escriba una letra, se ejecuta esto:
        buscador.addEventListener('input', (e) => {
            const textoBuscado = e.target.value.toLowerCase();
            
            // Seleccionamos todas las notas que estén dentro de tu lista
            // (Asumo que mostrar.js crea <li> o <div> dentro de #listaNotas)
            const notasEnPantalla = document.querySelectorAll('#listaNotas > *');

            notasEnPantalla.forEach(nota => {
                // Leemos todo el texto que contiene esa nota
                const contenidoDeLaNota = nota.textContent.toLowerCase();

                // Si el texto de la nota incluye lo que escribimos, la mostramos. Si no, la ocultamos.
                if (contenidoDeLaNota.includes(textoBuscado)) {
                    nota.style.display = ''; // Lo deja como estaba originalmente
                } else {
                    nota.style.display = 'none'; // Lo esconde
                }
            });
        });
    });
</script>
</body>
</html>
