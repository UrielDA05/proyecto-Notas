<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña</title>
    <style>
        /* Estilos básicos centrados para que funcione de inmediato */
        body { font-family: sans-serif; background-color: #f26d21; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); text-align: center; }
        input { width: 100%; padding: 10px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;}
        button { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px;}
    </style>
</head>
<body>

    <div class="card">
        <h2>Crear Nueva Contraseña</h2>
        <input type="password" id="newPasswordInput" placeholder="Escribe tu nueva contraseña">
        <button onclick="guardarNuevaPassword()">Guardar Contraseña</button>
    </div>

    <script>
        async function guardarNuevaPassword() {
            // 1. Extraemos el token invisible de la URL (el link que te mandó el correo)
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const newPassword = document.getElementById('newPasswordInput').value;

            if (!newPassword) return alert("Por favor ingresa una contraseña.");

            // 2. Mandamos la nueva contraseña a tu servidor
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, newPassword: newPassword })
                });

                const data = await response.json();

                // 3. Avisamos al usuario y lo mandamos a iniciar sesión
                if (response.ok) {
                    alert("¡Éxito! " + data.message);
                    window.location.href = "/"; // Cambia el "/" por el nombre de tu archivo de login si es diferente (ej. "/index.html")
                } else {
                    alert("Error: " + data.error);
                }
            } catch (error) {
                console.error("Error al actualizar:", error);
            }
        }
    </script>

</body>
</html>
