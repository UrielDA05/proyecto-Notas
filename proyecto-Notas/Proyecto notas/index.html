<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/estilo_1.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
    <style>
        /* Reglas mínimas para el control asíncrono sin romper el diseño del formulario */
        .hidden { display: none !important; }
        #msg {
            font-size: 1.2rem;
            color: #2dc7ff;
            margin-bottom: 12px;
            text-align: center;
            font-weight: bold;
        }
        .pwa-links {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            text-align: center;
        }
        .pwa-links a {
            color: #fe6929;
            text-decoration: none;
            font-size: 1.1rem;
        }
        .pwa-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <form class="login-form" id="formulario-login" onsubmit="event.preventDefault();">
        <div>
            <i class="bi bi-person-fill"></i>
        </div>
        <h1 id="formTitle">Iniciar Sesión</h1>

        <div id="msg" class="hidden"></div>

        <input type="text" placeholder="Usuario" required id="nombre">
        <input type="password" placeholder="Contraseña" required id="password">

        <button type="submit" id="btnAction">Iniciar sesión</button>

        <div class="pwa-links">
            <a href="#" id="linkToggle">¿No tienes cuenta? Regístrate</a>
            <a href="#" id="linkRecover">Olvidé mi contraseña</a>
        </div>
    </form>

    <script src="js/login.js"></script>
</body>
</html>
