<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/estilo_1.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
</head>
<body>

    <form class="login-form" id="formulario-login" onsubmit="event.preventDefault();">
        <div>
            <i class="bi bi-person-fill"></i>
        </div>
        <h1>Iniciar Sesión</h1>

        <div id="msg" class="hidden"></div>

        <input type="text" placeholder="Correo" required id="nombre">
        <input type="password" placeholder="Contraseña" required id="password">

        <button type="submit" id="btnAction">Iniciar sesión</button>

        <div class="auth-links">
            <a href="registro.html">¿No tienes cuenta? Regístrate</a>
            <a href="recuperar.html">Olvidé mi contraseña</a>
        </div>
    </form>

    <script src="js/login.js"></script>
</body>
</html>
