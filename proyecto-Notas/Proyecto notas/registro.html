<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <link rel="stylesheet" href="css/estilo_1.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap" rel="stylesheet">
</head>
<body>

    <form class="login-form" id="formulario-registro" onsubmit="event.preventDefault();">
        <div>
            <i class="bi bi-person-plus-fill"></i>
        </div>
        <h1>Crear Cuenta</h1>

        <div id="msg" class="hidden"></div>

        <input type="text" placeholder="Correo Electrónico" required id="regNombre">
        <input type="password" placeholder="Contraseña" required id="regPassword">

        <button type="submit" id="btnRegister">Registrarse</button>

        <div class="auth-links">
            <a href="index.html">¿Ya tienes cuenta? Inicia Sesión</a>
        </div>
    </form>

    <script src="js/registro.js"></script>
</body>
</html>
